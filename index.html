<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MovieNight Planner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>🎬 MovieNight Planner</h1>
  </header>

  <div class="container">
    
    <aside>
      <h2>Géneros</h2>
      <ul>
        <li>Acción</li>
        <li>Comedia</li>
        <li>Ciencia Ficción</li>
        <li>Drama</li>
      </ul>
    </aside>

    <main>

      <input 
  type="text" 
  id="search-input" 
  placeholder="Buscar película..."
>

      <form id="task-form">
  <input type="text" id="task-input" placeholder="Añadir nueva película..." required>
  
  <!-- Selección de categoría -->
  <select id="category-select">
    <option value="Acción">Acción</option>
    <option value="Comedia">Comedia</option>
    <option value="Ciencia Ficción">Ciencia Ficción</option>
    <option value="Drama">Drama</option>
  </select>

  <!-- Selección de prioridad -->
  <select id="priority-select">
    <option value="high">Alta</option>
    <option value="medium" selected>Media</option>
    <option value="low">Baja</option>
  </select>

  <button type="submit">Añadir</button>
</form>

  <button id="random-movie-btn">🎬 Elegir película para esta noche</button>

<p id="random-result"></p>

<section class="task-list">
</section>

    </main>

    </div>

  <script src="app.js"></script>

</body>
</html>
