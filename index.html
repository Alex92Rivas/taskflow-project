<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MovieNight Planner</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
    };
  </script>

  <link rel="stylesheet" href="styles.css" />
</head>

<body class="bg-gradient-to-r from-black to-red-900 text-gray-100 min-h-screen transition-colors duration-300">
  <!-- HEADER -->
  <header class="bg-gray-800/80 backdrop-blur-sm text-red-400 p-4 shadow-lg mb-4 transition-colors duration-300">
    <div class="w-full px-4 md:px-6 lg:px-8 flex items-center justify-between">
      <div class="w-12"></div>

      <h1
        class="text-3xl md:text-4xl tracking-widest text-center flex-1 font-bold"
        style="font-family: 'Bebas Neue', sans-serif;"
      >
        🎬 MovieNight Planner
      </h1>

      <button
        id="theme-toggle"
        class="w-12 h-12 flex items-center justify-center bg-gray-700 text-yellow-400 rounded-full hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-yellow-400 transition duration-300"
        aria-label="Alternar modo claro y oscuro"
        title="Alternar modo claro y oscuro"
      >
        💡
      </button>
    </div>
  </header>

  <!-- CONTENEDOR PRINCIPAL -->
  <div class="w-full px-4 md:px-6 lg:px-8 pb-6">
    <div class="flex flex-col lg:flex-row gap-6 items-start">
      <!-- ASIDE -->
      <aside class="sidebar w-full lg:w-64 shrink-0 p-4 rounded shadow-lg transition-colors duration-300">
        <button
          id="toggle-genres"
          type="button"
          class="w-full flex items-center justify-between text-left text-xl font-bold pb-2 mb-4 border-b focus:outline-none"
          aria-expanded="true"
          aria-controls="genre-list"
        >
          <span>Géneros</span>
          <span id="genre-arrow" class="text-sm">▼</span>
        </button>

        <ul id="genre-list" class="space-y-2">
          <li data-category="Todas" class="category-filter cursor-pointer font-semibold">Todas</li>
          <li data-category="Acción" class="category-filter cursor-pointer font-semibold">Acción</li>
          <li data-category="Comedia" class="category-filter cursor-pointer font-semibold">Comedia</li>
          <li data-category="Drama" class="category-filter cursor-pointer font-semibold">Drama</li>
          <li data-category="Terror" class="category-filter cursor-pointer font-semibold">Terror</li>
          <li data-category="Ciencia Ficción" class="category-filter cursor-pointer font-semibold">Ciencia Ficción</li>
          <li data-category="Fantasía" class="category-filter cursor-pointer font-semibold">Fantasía</li>
          <li data-category="Romance" class="category-filter cursor-pointer font-semibold">Romance</li>
          <li data-category="Documental" class="category-filter cursor-pointer font-semibold">Documental</li>
          <li data-category="Musical" class="category-filter cursor-pointer font-semibold">Musical</li>
          <li data-category="Serie" class="category-filter cursor-pointer font-semibold">Serie</li>
        </ul>
      </aside>

      <!-- MAIN -->
      <main class="flex-1 w-full space-y-4 bg-gray-800/90 p-4 rounded shadow min-h-[70vh] transition-colors duration-300">
        <!-- BUSCADOR -->
        <input
          type="text"
          id="search-input"
          placeholder="Buscar película..."
          class="w-full p-3 rounded focus:ring focus:ring-yellow-400 focus:outline-none transition text-base"
        />

        <!-- FORMULARIO -->
        <form id="task-form" class="flex flex-col md:flex-row gap-2 md:items-stretch">
          <input
            type="text"
            id="task-input"
            placeholder="Añadir nueva película..."
            required
            class="flex-1 p-3 rounded focus:ring focus:ring-blue-400 focus:outline-none transition text-base"
          />

          <select
            id="category-select"
            class="p-3 rounded focus:outline-none focus:ring focus:ring-blue-400 transition text-base"
          >
            <option value="Acción">Acción</option>
            <option value="Comedia">Comedia</option>
            <option value="Drama">Drama</option>
            <option value="Terror">Terror</option>
            <option value="Ciencia Ficción">Ciencia Ficción</option>
            <option value="Fantasía">Fantasía</option>
            <option value="Romance">Romance</option>
            <option value="Documental">Documental</option>
            <option value="Musical">Musical</option>
            <option value="Serie">Serie</option>
          </select>

          <select
            id="priority-select"
            class="p-3 rounded focus:outline-none focus:ring focus:ring-blue-400 transition text-base"
          >
            <option value="high">Alta</option>
            <option value="medium" selected>Media</option>
            <option value="low">Baja</option>
          </select>

          <button
            type="submit"
            class="px-4 py-3 bg-blue-700 text-white rounded hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-400 transition duration-300"
          >
            Añadir
          </button>
        </form>

        <!-- BOTONES -->
        <div class="flex flex-wrap items-center gap-2">
          <button
            id="random-movie-btn"
            class="px-4 py-3 bg-purple-700 text-white rounded hover:bg-purple-600 focus:outline-none focus:ring-2 focus:ring-purple-400 transition duration-300"
          >
            🎬 Peli para esta noche
          </button>

          <button
            id="sort-movies-btn"
            class="px-4 py-3 bg-indigo-700 text-white rounded hover:bg-indigo-600 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
          >
            Ordenar películas
          </button>

          <span
            id="seen-counter"
            class="ml-auto inline-flex items-center px-3 py-2 rounded bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300 font-semibold text-sm"
          >
            Vistas: 0
          </span>
        </div>

        <!-- MENSAJES -->
        <p id="random-result" class="text-yellow-400 text-xl font-bold mt-3"></p>
        <p id="loading-state" class="hidden text-blue-400 font-semibold mt-2">Cargando datos...</p>
        <p id="error-state" class="hidden text-red-400 font-semibold mt-2">Ha ocurrido un error.</p>
        <p id="success-state" class="hidden text-green-400 font-semibold mt-2">Operación realizada correctamente.</p>

        <!-- LISTA -->
        <section class="task-list space-y-4"></section>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
