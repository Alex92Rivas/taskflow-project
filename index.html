<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>TaskFlow</h1>
  </header>

  <div class="container">
    
    <aside>
      <h2>Categorías</h2>
      <ul>
        <li>Trabajo</li>
        <li>Personal</li>
        <li>Estudio</li>
      </ul>
    </aside>

    <main>
      <section class="task-list">

        <article class="task-card">
          <h3>Diseñar landing</h3>
          <span class="category">Trabajo</span>
          <span class="priority high">Alta</span>
        </article>

        <article class="task-card">
          <h3>Preparar presentación</h3>
          <span class="category">Estudio</span>
          <span class="priority medium">Media</span>
        </article>

      </section>
    </main>

  </div>

</body>
</html>
