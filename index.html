<!DOCTYPE html>
<html lang="es" class="">
<head>
  <meta charset="UTF-8">
  <title>MovieNight Planner</title>

  <!-- TAILWIND CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ACTIVAR MODO OSCURO POR CLASE -->
  <script>
    tailwind.config = {
      darkMode: "class"
    }
  </script>

  <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gradient-to-r from-gray-200 to-red-300 dark:from-black dark:to-red-900 text-gray-900 dark:text-gray-100 min-h-screen">

  <!-- HEADER -->
  <header class="bg-gray-200/80 dark:bg-gray-800/80 backdrop-blur-sm text-red-600 dark:text-red-400 p-4 shadow-lg mb-6 rounded">
    <div class="container mx-auto flex items-center justify-between">
      <div class="w-12"></div>

      <h1 class="text-4xl tracking-widest text-center flex-1 font-bold" style="font-family: 'Bebas Neue', sans-serif;">
        🎬 MovieNight Planner
      </h1>

      <button 
        id="theme-toggle"
        class="w-12 h-12 flex items-center justify-center bg-gray-300 dark:bg-gray-700 text-yellow-500 dark:text-yellow-400 rounded-full hover:bg-gray-400 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-yellow-400 transition duration-300"
        aria-label="Alternar modo oscuro"
        title="Alternar modo oscuro"
      >
        💡
      </button>
    </div>
  </header>

  <!-- CONTENEDOR PRINCIPAL -->
  <div class="container mx-auto flex gap-6 px-4">

    <!-- ASIDE -->
    <aside class="w-64 bg-gray-300 dark:bg-gray-800 text-gray-900 dark:text-gray-100 p-4 rounded shadow-lg border-r border-gray-500 dark:border-gray-700">
      <h2 class="text-xl font-bold text-indigo-600 dark:text-indigo-400 border-b border-gray-400 dark:border-gray-600 pb-2 mb-4">
        Géneros
      </h2>

      <ul class="space-y-2">
        <li class="cursor-pointer text-blue-900 dark:text-yellow-300 hover:text-blue-700 dark:hover:text-yellow-200 transition font-semibold">Acción</li>
        <li class="cursor-pointer text-blue-900 dark:text-yellow-300 hover:text-blue-700 dark:hover:text-yellow-200 transition font-semibold">Comedia</li>
        <li class="cursor-pointer text-blue-900 dark:text-yellow-300 hover:text-blue-700 dark:hover:text-yellow-200 transition font-semibold">Ciencia Ficción</li>
        <li class="cursor-pointer text-blue-900 dark:text-yellow-300 hover:text-blue-700 dark:hover:text-yellow-200 transition font-semibold">Drama</li>
      </ul>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 space-y-4 bg-gray-50 dark:bg-gray-800 p-4 rounded shadow">

      <!-- BUSCADOR -->
      <input 
        type="text" 
        id="search-input" 
        placeholder="Buscar película..."
        class="w-full p-2 rounded bg-white text-black placeholder-gray-500 dark:bg-gray-700 dark:text-white dark:placeholder-gray-300 focus:ring focus:ring-yellow-400 focus:outline-none transition"
      >

      <!-- FORMULARIO -->
      <form id="task-form" class="flex gap-2 flex-wrap">

        <input 
          type="text" 
          id="task-input" 
          placeholder="Añadir nueva película..." 
          required
          class="flex-1 p-2 rounded bg-white text-black placeholder-gray-500 dark:bg-gray-700 dark:text-white dark:placeholder-gray-300 focus:ring focus:ring-blue-400 focus:outline-none transition"
        >

        <select 
          id="category-select"
          class="p-2 rounded bg-white text-black dark:bg-gray-700 dark:text-white focus:outline-none focus:ring focus:ring-blue-400 transition"
        >
          <option value="Acción" class="text-black">Acción</option>
          <option value="Comedia" class="text-black">Comedia</option>
          <option value="Ciencia Ficción" class="text-black">Ciencia Ficción</option>
          <option value="Drama" class="text-black">Drama</option>
        </select>

        <select 
          id="priority-select"
          class="p-2 rounded bg-white text-black dark:bg-gray-700 dark:text-white focus:outline-none focus:ring focus:ring-blue-400 transition"
        >
          <option value="high" class="text-black">Alta</option>
          <option value="medium" selected class="text-black">Media</option>
          <option value="low" class="text-black">Baja</option>
        </select>

        <button 
          type="submit"
          class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-500 dark:bg-blue-700 dark:hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-400 transition duration-300"
        >
          Añadir
        </button>
      </form>

      <!-- BOTÓN ALEATORIO -->
      <button 
        id="random-movie-btn"
        class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-500 dark:bg-purple-700 dark:hover:bg-purple-600 focus:outline-none focus:ring-2 focus:ring-purple-400 transition duration-300"
      >
        🎬 Peli para esta noche
      </button>

      <!-- RESULTADO ALEATORIO -->
      <p id="random-result" class="text-yellow-600 dark:text-yellow-400 text-xl font-bold mt-3"></p>

      <!-- LISTA DE TAREAS -->
      <section class="task-list space-y-4"></section>

    </main>

  </div>

  <script src="app.js"></script>

</body>
</html>
