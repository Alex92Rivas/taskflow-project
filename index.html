<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MovieNight Planner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>🎬 MovieNight Planner</h1>
  </header>

  <div class="container">
    
    <aside>
      <h2>Géneros</h2>
      <ul>
        <li>Acción</li>
        <li>Comedia</li>
        <li>Ciencia Ficción</li>
        <li>Drama</li>
      </ul>
    </aside>

    <main>
      <section class="task-list">

        <article class="task-card">
          <h3>Interstellar</h3>
          <span class="category">Ciencia Ficción</span>
          <span class="priority high">Imprescindible</span>
        </article>

        <article class="task-card">
          <h3>El Caballero Oscuro</h3>
          <span class="category">Acción</span>
          <span class="priority high">Top</span>
        </article>

        <article class="task-card">
          <h3>La La Land</h3>
          <span class="category">Drama</span>
          <span class="priority medium">Interesante</span>
        </article>

        <article class="task-card">
          <h3>Superbad</h3>
          <span class="category">Comedia</span>
          <span class="priority low">Ligera</span>
        </article>

      </section>
    </main>

  </div>

</body>
</html>
